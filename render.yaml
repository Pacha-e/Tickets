services:
  - type: web
    name: vibepas
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py compilemessages && python manage.py collectstatic --no-input
    startCommand: python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    disk:
      name: vibepas-media
      mountPath: /opt/render/project/src/media
      sizeGB: 1
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: vibepas-db
          property: connectionString
      - key: MEDIA_ROOT
        value: /opt/render/project/src/media
      - key: STATIC_ROOT
        value: /opt/render/project/src/staticfiles
      - key: WEB_CONCURRENCY
        value: "4"

databases:
  - name: vibepas-db
